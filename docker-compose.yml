services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: colegio_cristao
      POSTGRES_USER: cc_user
      POSTGRES_PASSWORD: cc_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/config/migration_class_teachers.sql:/docker-entrypoint-initdb.d/02_class_teachers.sql
      - ./backend/src/config/migration_gamification.sql:/docker-entrypoint-initdb.d/03_gamification.sql
      - ./backend/src/config/migration_profile_code.sql:/docker-entrypoint-initdb.d/04_profile_code.sql
      - ./backend/src/config/migration_grade_levels_segment.sql:/docker-entrypoint-initdb.d/05_grade_levels_segment.sql
      - ./backend/src/config/migration_nullable_email.sql:/docker-entrypoint-initdb.d/06_nullable_email.sql
      - ./backend/src/config/migration_books.sql:/docker-entrypoint-initdb.d/07_books.sql
      - ./backend/src/config/migration_books_subject.sql:/docker-entrypoint-initdb.d/08_books_subject.sql
      - ./backend/src/config/migration_book_collections.sql:/docker-entrypoint-initdb.d/09_book_collections.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc_user -d colegio_cristao"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express API) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cc_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: colegio_cristao
      DB_USER: cc_user
      DB_PASSWORD: cc_secret
      JWT_SECRET: ${JWT_SECRET:-colegio-cristao-mude-em-producao}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@colegiocristao.edu.br}
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-400}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: cc_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
